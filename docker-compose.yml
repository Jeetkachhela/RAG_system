version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./K Apply - Accounts Dump - 18.03.2026 (1).xlsx:/K Apply - Accounts Dump - 18.03.2026 (1).xlsx:ro
    environment:
      # Use env_file or set statically for prod
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CHROMA_DB_DIR=/app/chroma_db
      - EXCEL_FILE_PATH=/K Apply - Accounts Dump - 18.03.2026 (1).xlsx
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
